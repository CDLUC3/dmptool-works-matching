template:
  path: 'codepipeline/dmpworks.yaml'
  type: 'file'

parameters:
  CodeStarConnectionArn: !stack_output dev/codestar.yaml::CodestarConnectionARN

  S3ArtifactBucketId: !stack_output dev/s3.yaml::S3BucketID

  CodeBuildProjectName: !stack_output dev/codebuild/dmpworks.yaml::CodeBuildProjectId

  ChatbotConfigArn: !stack_output_external dmp-tool-dev-chatbot::SlackChannelConfigurationArn

  Env: !stack_attr sceptre_user_data.env

  AppName: "{{ var.project_code }}"

  RepositoryName: 'CDLUC3/dmptool-works-matching'

  BranchToMonitor: 'development'

  SourceOutputArtifactFormat: 'CODEBUILD_CLONE_REF'

dependencies:
  - dev/s3.yaml
  - dev/codebuild/dmpworks.yaml
