template:
  path: 'chatbot.yaml'
  type: file

parameters:
  # Value can be found in the AWS console. We store this in SSM Parameter Store.
  SlackWorkspaceId: !ssm /uc3/dmp/tool/dev/SlackWorkspaceId

  # To get the ID, open Slack, right click on the channel name in the left pane, then choose Copy Link.
  # The channel ID is the character string at the end of the URL. For example, ABCBBLZZZ.
  # We store this in SSM Parameter Store.
  SlackChannelId: !ssm /uc3/dmp/tool/dev/SlackChannelId

  # Dead Letter Queue Alarm Topics
  AlarmTopics:
    - !stack_output dev/cloudwatch.yaml::ELBAlarmTopicArn
    - !stack_output dev/lambda/function/generateMaDMPRecord.yaml::AlarmTopicArn
    - !stack_output dev/lambda/function/syncMaDMPRecords.yaml::AlarmTopicArn
