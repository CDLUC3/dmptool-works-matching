        for the cited dataset and for the citing publication&nbsp;</p>\n</li>\n</ul>\n<p>The
        data file includes the following fields:</p>\n<div>\n<table>\n<tbody>\n<tr>\n<td>\n<p>Field</p>\n</td>\n<td>\n<p>Description</p>\n</td>\n<td>\n<p>Required?</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>id</p>\n</td>\n<td>\n<p>Internal
        identifier for the citation</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>created</p>\n</td>\n<td>\n<p>Date
        of item''s incorporation into the corpus</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>updated</p>\n</td>\n<td>\n<p>Date
        of item''s most recent update in corpus</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>repository</p>\n</td>\n<td>\n<p>Repository
        where cited data is stored</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>publisher</p>\n</td>\n<td>\n<p>Publisher
        for the article citing the data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>journal</p>\n</td>\n<td>\n<p>Journal
        for the article citing the data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>title</p>\n</td>\n<td>\n<p>Title
        of cited data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>publication</p>\n</td>\n<td>\n<p>DOI
        of article where data is cited</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>dataset</p>\n</td>\n<td>\n<p>DOI
        or accession number of cited data</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>publishedDate</p>\n</td>\n<td>\n<p>Date
        when citing article was published</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>source</p>\n</td>\n<td>\n<p>Source
        where citation was harvested</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>subjects</p>\n</td>\n<td>\n<p>Subject
        information for cited data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>affiliations</p>\n</td>\n<td>\n<p>Affiliation
        information for creator of cited data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>funders</p>\n</td>\n<td>\n<p>Funding
        information for cited data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n</tbody>\n</table>\n</div>\n<p><strong>&nbsp;</strong></p>\n<p>Additional
        documentation about the citations and metadata in the file is available on
        the <a href=\"https://makedatacount.org/find-a-tool/data-citation-corpus-documentation/\">Make
        Data Count website</a>.&nbsp;</p>\n<p>The second release of the Data Citation
        Corpus data file reflects several changes made to add new citations, remove
        some records deemed out of scope for the corpus, update and enhance citation
        metadata, and improve the overall usability of the file. These changes are
        as follows:</p>\n<p>Add and update Event Data citations:</p>\n<ul>\n<li>\n<p>Add
        179,885 new data citations created in DataCite Event Data between 01 June
        2023 through 30 June 2024</p>\n</li>\n</ul>\n<p>Remove citation records deemed
        out of scope for the corpus:</p>\n<ul>\n<li>\n<p>273,567 records from DataCite
        Event Data with non-citation relationship types&nbsp;</p>\n</li>\n<li>\n<p>28,334
        citations to items in non-data repositories (clinical trials registries, stem
        cells, samples, and other non-data materials)</p>\n</li>\n<li>\n<p>44,117
        invalid citations where subj_id value was the same as the obj_id value or
        subj_id and obj_id are inverted, indicating a citation from a dataset to a
        publication</p>\n</li>\n<li>\n<p>473,792 citations to invalid accession numbers
        from CZI data present in v1.1 as a result of false positives in the algorithm
        used to identify mentions</p>\n</li>\n<li>\n<p>4,110,019 duplicate records
        from CZI data present in v1.1 where metadata is the same for obj_id, subj_id,
        repository_id, publisher_id, journal_id, accession_number, and source_id (the
        record with the most recent updated date was retained in all of these cases)</p>\n</li>\n</ul>\n<p>Metadata
        enhancements:</p>\n<ul>\n<li>\n<p>Apply Field of Science subject terms to
        citation records originating from CZI, based on disciplinary area of data
        repository</p>\n</li>\n<li>\n<p>Initial cleanup of affiliation and funder
        organization names to remove personal email addresses and social media handles
        (additional cleanup and standardization in progress and will be included in
        future releases)</p>\n</li>\n</ul>\n<p>Data structure updates to improve usability
        and eliminate redundancies:</p>\n<ul>\n<li>\n<p>Rename subj_id and obj_id
        fields to &ldquo;dataset&rdquo; and &ldquo;publication&rdquo; for clarity</p>\n</li>\n<li>\n<p>Remove
        accessionNumber and doi elements to eliminate redundancy with subj_id</p>\n</li>\n<li>\n<p>Remove
        relationTypeId fields as these are specific to Event Data only</p>\n</li>\n</ul>\n<p><strong>&nbsp;</strong></p>\n<p>Full
        details of the above changes, including scripts used to perform the above
        tasks, are available in <a href=\"https://github.com/Make-Data-Count-Community/corpus-data-file\"
        target=\"_blank\" rel=\"noopener\">GitHub</a>.&nbsp;</p>\n<p>While v2 addresses
        a number of cleanup and enhancement tasks, additional data issues may remain,
        and additional enhancements are being explored. These will be addressed in
        the course of subsequent data file releases.&nbsp;</p>\n<p><strong><br></strong>Feedback
        on the data file can be submitted via <a href=\"https://github.com/Make-Data-Count-Community/data-citation-corpus-feedback\"
        target=\"_blank\" rel=\"noopener\">GitHub</a>. For general questions, email
        <a href=\"mailto:info@makedatacount.org\">info@makedatacount.org</a>.</p>",
