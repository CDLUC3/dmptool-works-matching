        "metadata": {"title": "Data Citation Corpus Data File", "doi": "10.5281/zenodo.14897662",
        "publication_date": "2025-02-01", "description": "<p>Data file for the third
        release of the Data Citation Corpus, produced by DataCite and Make Data Count
        as part of an ongoing grant project funded by the Wellcome Trust. <a href=\"https://makedatacount.org/data-citation/\">Read
        more about the project</a>.</p>\n<p>The data file includes 5,322,388 data
        citation records in JSON and CSV formats. The JSON file is the version of
        record.</p>\n<p>For convenience, the data is provided in batches of approximately
        1 million records each. The publication date and batch number are included
        in the file name, ex: 2025-02-01-data-citation-corpus-01-v3.0.json.</p>\n<p>The
        data citations in the file originate from the following sources:</p>\n<ul>\n<li>DataCite
        Event Data</li>\n<li>A project by Chan Zuckerberg Initiative (CZI) to identify
        mentions to datasets in the full text of articles</li>\n<li>Data citations
        identified Aligning Science Across Parkinson&rsquo;s (ASAP)</li>\n</ul>\n<p>Each
        data citation record is comprised of:</p>\n<ul>\n<li>\n<p>A pair of identifiers:
        An identifier for the dataset (a DOI or an accession number) and the DOI of
        the publication (journal article or preprint) in which the dataset is cited&nbsp;&nbsp;</p>\n</li>\n<li>\n<p>Metadata
        for the cited dataset and for the citing publication&nbsp;</p>\n</li>\n</ul>\n<p>The
        data file includes the following fields:</p>\n<div>\n<table>\n<tbody>\n<tr>\n<td>\n<p>Field</p>\n</td>\n<td>\n<p>Description</p>\n</td>\n<td>\n<p>Required?</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>id</p>\n</td>\n<td>\n<p>Internal
        identifier for the citation</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>created</p>\n</td>\n<td>\n<p>Date
        of item''s incorporation into the corpus</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>updated</p>\n</td>\n<td>\n<p>Date
        of item''s most recent update in corpus</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>repository</p>\n</td>\n<td>\n<p>Repository
        where cited data is stored</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>publisher</p>\n</td>\n<td>\n<p>Publisher
        for the article citing the data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>journal</p>\n</td>\n<td>\n<p>Journal
        for the article citing the data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>title</p>\n</td>\n<td>\n<p>Title
        of cited data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>publication</p>\n</td>\n<td>\n<p>DOI
        of article where data is cited</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>dataset</p>\n</td>\n<td>\n<p>DOI
        or accession number of cited data</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>publishedDate</p>\n</td>\n<td>\n<p>Date
        when citing article was published</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>source</p>\n</td>\n<td>\n<p>Source
        where citation was harvested</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>subjects</p>\n</td>\n<td>\n<p>Subject
        information for cited data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>affiliations</p>\n</td>\n<td>\n<p>Affiliation
        information for creator of cited data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>funders</p>\n</td>\n<td>\n<p>Funding
        information for cited data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n</tbody>\n</table>\n</div>\n<p><strong>&nbsp;</strong></p>\n<p>Additional
        documentation about the citations and metadata in the file is available on
        the <a href=\"https://makedatacount.org/find-a-tool/data-citation-corpus-documentation/\">Make
        Data Count website</a>.&nbsp;</p>\n<p><strong>Notes on v3.0:</strong></p>\n<p>The
        third release of the Data Citation Corpus data file reflects a few changes
        made to add new citations, including those from a new data source (ASAP),
        update and enhance citation metadata, and improve the overall usability of
        the file. These changes are as follows:</p>\n<p>Add and update Event Data
        citations:</p>\n<ul>\n<li>\n<p>Add 65,524 new data citations created in DataCite
        Event Data between August 2024 and December 2024</p>\n</li>\n</ul>\n<p>Add
        ASAP citations:</p>\n<ul>\n<li>\n<p>Add 750 new data citations provided by
        Aligning Science Across Parkinson&rsquo;s (ASAP), identified through processes
        to evaluate compliance with ASAP&rsquo;s for open science practices, which
        involve a partnership with DataSeer and internal curation (described <a href=\"https://journals.plos.org/ploscompbiol/article?id=10.1371/journal.pcbi.1011626\">here</a>).</p>\n</li>\n<li>\n<p>Citations
        with provenance from ASAP are identified as &ldquo;asap&rdquo; in the source
        field</p>\n</li>\n</ul>\n<p>Metadata enhancements:</p>\n<ul>\n<li>Reconcile
        and normalize organization names for affiliations and funders in a subset
        of records with the&nbsp;<a href=\"https://ror.org\">Research Organization
        Registry (ROR)</a>\n<ul>\n<li>Add ror_name and ror_id subfields for affiliations
        and funders in JSON files. Unreconciled affiliation and funder strings are
        identified with values of null</li>\n<li>Add new columns affiliationsROR and
        fundersROR in CSV files. Unreconciled affiliation and funder strings are identified
        with values of NONE NONE (this is to ensure consistency in number and order
        of values in cases where some strings have been reconciled and others have
        not)</li>\n</ul>\n</li>\n<li>Normalize DOI formats for articles and papers
        as full URLs</li>\n</ul>\n<p>Additional details about the above changes, including
        scripts used to perform the above tasks, are available in <a href=\"https://github.com/Make-Data-Count-Community/corpus-data-file\"
        target=\"_blank\" rel=\"noopener\">GitHub</a>.&nbsp;</p>\n<p>Additional enhancements
        to the corpus are ongoing and will be addressed in the course of subsequent
        releases. Users are invited to submit feedback via <a href=\"https://github.com/Make-Data-Count-Community/data-citation-corpus-feedback\">GitHub</a>.&nbsp;For
        general questions, email <a href=\"mailto:info@makedatacount.org\">info@makedatacount.org</a>.</p>",
