        "metadata": {"title": "Data Citation Corpus Data File", "doi": "10.5281/zenodo.11216814",
        "publication_date": "2024-05-10", "description": "<p>Data file for the first
        release of the Data Citation Corpus, produced by DataCite and Make Data Count
        as part of an ongoing grant project funded by the Wellcome Trust. <a href=\"https://makedatacount.org/data-citation/\">Read
        more about the project</a>.</p>\n<p>The data file includes 10,006,058 data
        citation records in JSON and CSV formats. The JSON file is the version of
        record.</p>\n<p>Version 1.0 of the corpus data file was released on January
        30, 2024. Release v1.1 is an optimized version of v1.0 designed to make the
        original citation records more usable. No citations have been added to or
        removed from the dataset in v1.1.&nbsp;</p>\n<p>For convenience, the data
        file is provided in batches of approximately 1 million records each. The publication
        date and batch number are included in each component file name, ex: 2024-05-10-data-citation-corpus-01-v1.1.json.</p>\n<p>The
        data citations in the file originate from DataCite Event Data and a project
        by Chan Zuckerberg Initiative (CZI) to identify mentions to datasets in the
        full text of articles.&nbsp;</p>\n<p>Each data citation record&nbsp; is comprised
        of:</p>\n<ul>\n<li>\n<p>A pair of identifiers: An identifier for the dataset
        (a DOI or an accession number) and the DOI of the publication object (journal
        article or preprint) in which the dataset is cited&nbsp;&nbsp;</p>\n</li>\n<li>\n<p>Metadata
        for the cited dataset and for the citing publication object</p>\n</li>\n</ul>\n<p>The
        data file includes the following fields:</p>\n<table>\n<tbody>\n<tr>\n<td>\n<p><strong>Field</strong></p>\n</td>\n<td>\n<p><strong>Description</strong></p>\n</td>\n<td>\n<p><strong>Required?</strong></p>\n</td>\n</tr>\n<tr>\n<td>\n<p>id</p>\n</td>\n<td>\n<p>Internal
        identifier for the citation</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>created</p>\n</td>\n<td>\n<p>Date
        of item''s incorporation into the corpus</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>updated</p>\n</td>\n<td>\n<p>Date
        of item''s most recent update in corpus</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>repository</p>\n</td>\n<td>\n<p>Repository
        where cited data is stored</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>publisher</p>\n</td>\n<td>\n<p>Publisher
        for the article citing the data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>journal</p>\n</td>\n<td>\n<p>Journal
        for the article citing the data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>title</p>\n</td>\n<td>\n<p>Title
        of cited data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>objId</p>\n</td>\n<td>\n<p>DOI
        of article where data is cited</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>subjId</p>\n</td>\n<td>\n<p>DOI
        or accession number of cited data</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>publishedDate</p>\n</td>\n<td>\n<p>Date
        when citing article was published</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>accessionNumber</p>\n</td>\n<td>\n<p>Accession
        number of cited data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>doi</p>\n</td>\n<td>\n<p>DOI
        of cited data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>relationTypeId</p>\n</td>\n<td>\n<p>Relation
        type in metadata between citation object and subject</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>source</p>\n</td>\n<td>\n<p>Source
        where citation was harvested</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>subjects</p>\n</td>\n<td>\n<p>Subject
        information for cited data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>affiliations</p>\n</td>\n<td>\n<p>Affiliation
        information for creator of cited data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>funders</p>\n</td>\n<td>\n<p>Funding
        information for cited data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n</tbody>\n</table>\n<div>\n<p>&nbsp;</p>\n<p>Additional
        documentation about the citations and metadata in the file is available on
        the&nbsp;<a href=\"https://makedatacount.org/data-citation-corpus-documentation/\">Make
        Data Count website</a>.</p>\n<p>Feedback on the data file can be submitted
        via&nbsp;<a href=\"https://github.com/datacite/make-data-count\">Github</a>.
        For general questions, email info@makedatacount.org.</p>\n</div>", "access_right":
