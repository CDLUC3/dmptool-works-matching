    body:
      string: '{"hits": {"hits": [{"created": "2025-08-19T09:18:46.244708+00:00",
        "modified": "2025-08-19T09:18:46.419885+00:00", "id": 16901115, "conceptrecid":
        "11196858", "doi": "10.5281/zenodo.16901115", "conceptdoi": "10.5281/zenodo.11196858",
        "doi_url": "https://doi.org/10.5281/zenodo.16901115", "metadata": {"title":
        "Data Citation Corpus Data File", "doi": "10.5281/zenodo.16901115", "publication_date":
        "2025-08-15", "description": "<p>Data file for the fourth release of the Data
        Citation Corpus, produced by DataCite and Make Data Count as part of an ongoing
        grant project funded by the Wellcome Trust. <a href=\"https://makedatacount.org/data-citation/\">Read
        more about the project</a>.</p>\n<p>The data file includes 10,697,745 data
        citation records (of which 9,682,257 represent unique dataset-publication
        pairs) in JSON and CSV formats. The JSON file is the version of record.</p>\n<p>Data
        is provided in batches of approximately 1 million records each. The publication
        date and batch number are included in the file name, ex: 2025-08-15-data-citation-corpus-01-v4.1.json.</p>\n<p>The
        data citations in the file originate from the following sources:</p>\n<ul>\n<li>DataCite
        Event Data</li>\n<li>Chan Zuckerberg Initiative (CZI) Science Knowledge Graph</li>\n<li>Aligning
        Science Across Parkinson&rsquo;s (ASAP)</li>\n<li>Europe PMC</li>\n</ul>\n<p>Each
        data citation record is comprised of:</p>\n<ul>\n<li>\n<p>A pair of identifiers:
        An identifier for the dataset (a DOI or an accession number) and the DOI of
        the publication (journal article or preprint) in which the dataset is cited&nbsp;&nbsp;</p>\n</li>\n<li>\n<p>Metadata
        for the cited dataset and for the citing publication&nbsp;</p>\n</li>\n</ul>\n<p>The
        data file includes the following fields:</p>\n<div>\n<table>\n<tbody>\n<tr>\n<td>\n<p>Field</p>\n</td>\n<td>\n<p>Description</p>\n</td>\n<td>\n<p>Required?</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>id</p>\n</td>\n<td>\n<p>Internal
        identifier for the citation</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>created</p>\n</td>\n<td>\n<p>Date
        of item''s incorporation into the corpus</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>updated</p>\n</td>\n<td>\n<p>Date
        of item''s most recent update in corpus</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>repository</p>\n</td>\n<td>\n<p>Repository
        where cited data is stored</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>publisher</p>\n</td>\n<td>\n<p>Publisher
        for the article citing the data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>journal</p>\n</td>\n<td>\n<p>Journal
        for the article citing the data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>title</p>\n</td>\n<td>\n<p>Title
        of cited data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>publication</p>\n</td>\n<td>\n<p>DOI
        of article where data is cited</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>dataset</p>\n</td>\n<td>\n<p>DOI
        or accession number of cited data</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>publishedDate</p>\n</td>\n<td>\n<p>Date
        when citing article was published</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>source</p>\n</td>\n<td>\n<p>Source
        where citation was harvested</p>\n</td>\n<td>\n<p>Yes</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>subjects</p>\n</td>\n<td>\n<p>Subject
        information for cited data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>affiliations</p>\n</td>\n<td>\n<p>Affiliation
        information for creator of cited data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n<tr>\n<td>\n<p>funders</p>\n</td>\n<td>\n<p>Funding
        information for cited data</p>\n</td>\n<td>\n<p>No</p>\n</td>\n</tr>\n</tbody>\n</table>\n</div>\n<p><strong>&nbsp;</strong></p>\n<p>Additional
        documentation about the citations and metadata in the file is available on
        the <a href=\"https://makedatacount.org/find-a-tool/data-citation-corpus-documentation/\">Make
        Data Count website</a>.&nbsp;</p>\n<p><strong>Notes on v4.1:</strong></p>\n<p>Version
        4.1 of the Data Citation Corpus is a minor update to v4.0 that corrects (1)
        an error that occurred when a portion of DOI-DOI citations originating from
        Europe PMC were attributed to the wrong repository, and (2) a small number
        of DOI formatting errors in the \"publication\" field.</p>\n<p><strong>Notes
        on v4.0:</strong></p>\n<p>The fourth release of the Data Citation Corpus data
        file adds new citations from the following sources:</p>\n<ul>\n<li>\n<p dir=\"ltr\">5.2
        million data citations from <a href=\"https://europepmc.org/\">Europe PMC</a>
        identified as \"eupmc\" in the source field. Ingest of these citations was
        performed 9 July 2025.</p>\n</li>\n<li>\n<p dir=\"ltr\">139,647 data citations
        from DataCite Event Data for the period 1 January 2025 through 30 June 2025.</p>\n</li>\n</ul>\n<p
        dir=\"ltr\">This release also includes the following new metadata enhancements:</p>\n<ul>\n<li>\n<p
        dir=\"ltr\">Affiliation information for cited data from the Gene Expression
        Omnibus (GEO) repository, reonciled to Research Organization Registry (ROR)
        IDs where possible.</p>\n</li>\n<li>\n<p dir=\"ltr\">Reconciliation of organization
        and funders names with the Research Organization Registry (ROR) for new citations
        from Event Data.</p>\n</li>\n<li>\n<p dir=\"ltr\">Application of Field of
        Science subject terms to citation records originating from Europe PMC, based
        on disciplinary area of data repository.</p>\n</li>\n</ul>\n<p>Additional
        details about the above changes, including scripts used to perform the above
        tasks, are available in <a href=\"https://github.com/Make-Data-Count-Community/corpus-data-file\"
        target=\"_blank\" rel=\"noopener\">GitHub</a>.&nbsp;</p>\n<p>Additional enhancements
        to the corpus are ongoing and will be addressed in the course of subsequent
        releases. Users are invited to submit feedback via <a href=\"https://github.com/Make-Data-Count-Community/data-citation-corpus-feedback\">GitHub</a>.&nbsp;For
        general questions, email <a href=\"mailto:info@makedatacount.org\">info@makedatacount.org</a>.</p>",
