        "metadata": {"title": "ROR Data", "doi": "10.5281/zenodo.7742581", "publication_date":
        "2023-03-16", "description": "<p>Data dump from the Research Organization
        Registry (ROR), a community-led registry of open identifiers for research
        organizations.</p>\n\n<p>Release v1.21 contains ROR IDs and metadata for 104,834
        research organizations. This includes the addition of 104 new records and
        metadata updates to 265 existing records. <a href=\"https://github.com/ror-community/ror-updates/releases/tag/v1.21\">See
        the release notes</a>.</p>\n\n<p>Starting with this release, the data dump
        includes a CSV version of the ROR data file in addition to the canonical JSON
        file. The data dump zip therefore now contains two files instead of one. If
        your code currently expects only one file, you will need to update it accordingly.
        The CSV contains a subset of fields from the JSON file, some of which have
        been flattened for easier parsing.</p>\n\n<p>Beginning with its <a href=\"https://doi.org/10.5281/zenodo.6347575\">
        March 2022 release</a>, ROR is curated independently from GRID. Semantic versioning
        beginning with v1.0 was added to reflect this departure from GRID. The existing
        data structure was not changed.</p>\n\n<p>From March 2022 onward, data releases
        are versioned as follows:</p>\n\n<ul>\n\t<li><strong>Minor versions (ex 1.1,
        1.2, 1.3):</strong>&nbsp; Contain changes to data, such as a new records and
