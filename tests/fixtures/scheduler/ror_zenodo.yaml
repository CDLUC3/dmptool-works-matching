        v2</a> format. For current data dump users, this means that you will find
        4 files in this release instead of 2. v2 files have `_schema_v2` in the filename.
        All 4 files contain the same records, however, new/updated records in this
        release have been curated in v2 and crosswalked from v2 to v1. v1 fields that
        do not exist in v2 are empty or null. <a href=\"https://ror.readme.io/changelog/2024-04-11-schema-api-v2\">Learn
        more about the schema v2 launch</a>.</p>\n<h2>Data format</h2>\n<p>Beginning
        with release v1.45 on 11 April 2024, data releases contain JSON and CSV files
