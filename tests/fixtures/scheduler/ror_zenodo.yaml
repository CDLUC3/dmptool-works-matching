        "metadata": {"title": "ROR Data", "doi": "10.5281/zenodo.10962799", "publication_date":
        "2024-04-11", "description": "<p>Data dump from the Research Organization
        Registry (ROR), a community-led registry of open identifiers for research
        organizations.</p>\n<p>Release v1.45 contains ROR IDs and metadata for 109,141
        research organizations in JSON and CSV format. This includes the addition
        of 110 new records and metadata updates to 106 existing records. <a href=\"https://github.com/ror-community/ror-updates/releases/tag/v1.45\">See
