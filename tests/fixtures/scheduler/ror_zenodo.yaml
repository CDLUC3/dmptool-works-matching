        "metadata": {"title": "ROR Data", "doi": "10.5281/zenodo.8259796", "publication_date":
        "2023-08-17", "description": "<p>Data dump from the Research Organization
        Registry (ROR), a community-led registry of open identifiers for research
        organizations.</p>\n\n<p>Release v1.30 contains ROR IDs and metadata for 106,319&nbsp;research
        organizations in JSON and CSV format. This includes the addition of 473 new
        records and metadata updates to 581 existing records.<a href=\"https://github.com/ror-community/ror-updates/releases/tag/v1.30\">
        See the release notes</a>.</p>\n\n<p>Beginning with its <a href=\"https://doi.org/10.5281/zenodo.6347575\">
        March 2022 release</a>, ROR is curated independently from GRID. Semantic versioning
        beginning with v1.0 was added to reflect this departure from GRID. The existing
        data structure was not changed.</p>\n\n<p>From March 2022 onward, data releases
        are versioned as follows:</p>\n\n<ul>\n\t<li><strong>Minor versions (ex 1.1,
        1.2, 1.3):</strong>&nbsp; Contain changes to data, such as a new records and
        updates to existing records. No changes to the data model/structure.</li>\n\t<li><strong>Patch
        versions (ex 1.0.1):</strong>&nbsp;Used infrequently to correct errors in
        a release. No changes to the data model/structure.</li>\n\t<li><strong>Major
        versions (ex 1.x, 2.x, 3.x):</strong>&nbsp; Contains changes to data model/structure,
        as well as the data itself. Major versions will be released with significant
        advance notice.</li>\n</ul>\n\n<p>For convenience, the date is also include
        in the release file name, ex: v1.0-2022-03-15-ror-data.zip.</p>\n\n<p>Beginning
        with the 16 Mar 2023 release, a CSV file is included in addition to the canonical
        JSON. The CSV contains a subset of fields from the JSON file, some of which
        have been flattened for easier parsing. The JSON file remains the version
        of record.</p>", "access_right": "open", "creators": [{"name": "Research Organization
