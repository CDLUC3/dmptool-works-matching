        organizations.</p>\n\n<p>Release v1.12&nbsp;contains ROR IDs and metadata
        for 102,993&nbsp;research organizations in JSON format. This release includes
        the addition of 63 new records and metadata updates in 254 existing records.&nbsp;<a
        href=\"https://github.com/ror-community/ror-updates/releases/tag/v1.12\">See
        the release notes</a>.</p>\n\n<p>Beginning with its&nbsp;<a href=\"https://doi.org/10.5281/zenodo.6347575\">March
