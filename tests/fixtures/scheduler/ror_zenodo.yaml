        "metadata": {"title": "ROR Data", "doi": "10.5281/zenodo.6347575", "publication_date":
        "2022-03-17", "description": "<p>Data dump from the Research Organization
        Registry (ROR), a community-led registry of open identifiers for research
        organizations.</p>\n\n<p>This release contains ROR IDs and metadata for 102,559
        research organizations in JSON format. <a href=\"https://github.com/ror-community/ror-updates/releases/tag/v1.0\">See
        the release notes</a>.</p>\n\n<p>This is ROR&#39;s first independent registry
        update following a planned divergence from GRID, which provided the original
        seed data for ROR. Prior to this update, ROR releases were synced to GRID.
        This release is not synced to GRID and does not include a corresponding GRID
        ID for every ROR ID.</p>\n\n<p>To represent the divergence from GRID, semantic
        versioning has been implemented. This release is v1.0. The data model has
        not changed, and future releases that include new/updated records will be
        incremented as minor versions (ex: v1.1, v1.2, etc).&nbsp;</p>\n\n<p>Read
        the <a href=\"https://ror.org/blog/2022-03-17-first-independent-release/\">release
        announcement</a> for more information.</p>", "access_right": "open", "creators":
