        are versioned as follows:</p>\n<ul>\n<li>\n<p>Minor versions (ex 1.1, 1.2,
        1.3): Contain changes to data, such as new records and updates to existing
        records. No changes to the data model/structure.</p>\n</li>\n<li>\n<p>Patch
        versions (ex 1.0.1): Used infrequently to correct errors in a release. No
        changes to the data model/structure.</p>\n</li>\n<li>\n<p>Major versions (ex
        1.x, 2.x, 3.x): Contain changes to data model/structure, as well as the data
        itself. Major versions will be released with significant advance notice.</p>\n</li>\n</ul>\n<p>For
        convenience, the date is also included in the release file name, ex: v1.0-2022-03-15-ror-data.zip.</p>\n<h2>Licensing</h2>\n<p>The
