    body:
      string: '{"hits": {"hits": [{"created": "2025-08-07T17:04:58.656980+00:00",
        "modified": "2025-08-12T14:58:01.938705+00:00", "id": 16762508, "conceptrecid":
        "6347574", "doi": "10.5281/zenodo.16762508", "conceptdoi": "10.5281/zenodo.6347574",
        "doi_url": "https://doi.org/10.5281/zenodo.16762508", "metadata": {"title":
        "ROR Data", "doi": "10.5281/zenodo.16762508", "publication_date": "2025-08-07",
        "description": "<p>Data dump from the Research Organization Registry (ROR),
        a community-led registry of open identifiers for research organizations.</p>\n<p>Release
        v1.69 contains ROR IDs and metadata for 118,371 research organizations in
        JSON and CSV format, in schema versions 1 and 2. This includes the addition
        of 787 new records and metadata updates to 978 existing records.<a href=\"https://github.com/ror-community/ror-updates/releases/tag/v1.69\">&nbsp;See
        the release notes</a>.</p>\n<h2>Data format</h2>\n<p>Beginning with release
        v1.45 on 11 April 2024, data releases contain JSON and CSV files formatted
        according to both <a href=\"https://github.com/ror-community/ror-schema/blob/master/ror_schema.json\">
        schema v1</a> and <a href=\"https://github.com/ror-community/ror-schema/blob/schema-v2-1/ror_schema_v2_1.json\">schema
        v2</a>. v2 files have `_schema_v2` appended to the end of the filename, ex
        v1.45-2024-04-11-ror-data_schema_v2.json. In order to maintain compatibility
        with previous releases, v1 files have no version information in the filename,
        ex v1.45-2024-04-11-ror-data.json</p>\n<p>For both versions, the CSV file
        contains a subset of fields from the JSON file, some of which have been flattened
        for easier parsing. As ROR records and the ROR schema are maintained in JSON,
        CSVs are for convenience only. JSON is the format of record.</p>\n<h2>Release
        versioning</h2>\n<p>Beginning with v1.45 in April 2024, ROR has introduced
        schema versioning, with files available in <a href=\"https://github.com/ror-community/ror-schema/blob/master/ror_schema.json\">schema
        v1</a> and <a href=\"https://github.com/ror-community/ror-schema/blob/schema-v2-1/ror_schema_v2_1.json\">schema
        v2</a>. The ROR API default version, however, remains v1 and will be changed
        to v2 in April 2025. To align with the API, the data dump major version will
        remain 1 until the API default version is changed to v2. At that time, the
        data dump major version will be incremented to 2 per below.</p>\n<p>Data releases
        are versioned as follows:</p>\n<ul>\n<li><strong>Minor versions (ex 1.1, 1.2,
        1.3):</strong>&nbsp; Contain changes to data, such as a new records and updates
        to existing records. No changes to the data model/structure.</li>\n<li><strong>Patch
        versions (ex 1.0.1):</strong>&nbsp; Used infrequently to correct errors in
        a release. No changes to the data model/structure.</li>\n<li><strong>Major
        versions (ex 1.x, 2.x, 3.x):</strong>&nbsp; Contains changes to data model/structure,
        as well as the data itself. Major versions will be released with significant
        advance notice.</li>\n</ul>\n<p>For convenience, the date is also include
        in the release file name, ex: v1.0-2022-03-15-ror-data.zip.</p>\n<p>The ROR
        data dump is provided under the <a href=\"https://creativecommons.org/publicdomain/zero/1.0\">
        Creative Commons CC0 Public Domain Dedication</a>. Location data in ROR comes
        from GeoNames and is licensed under a <a href=\"https://creativecommons.org/licenses/by/4.0\">Creative
        Commons Attribution 4.0 license</a>.</p>", "access_right": "open", "creators":
