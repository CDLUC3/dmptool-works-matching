        "metadata": {"title": "ROR Data", "doi": "10.5281/zenodo.10995199", "publication_date":
        "2024-04-18", "description": "<p>Data dump from the Research Organization
        Registry (ROR), a community-led registry of open identifiers for research
        organizations.</p>\n<p>Release v1.45.1 contains ROR IDs and metadata for 109,141
        research organizations in JSON and CSV format. This includes metadata updates
        to 108,925 existing records. This release is a patch update that corrects
        the last updated schema version for all schema v2.0 records added or updated
        prior to release v1.45. No records were changed for schema v1.0.&nbsp;<a href=\"https://github.com/ror-community/ror-updates/releases/tag/v1.45.1\">See
        the release notes</a>.</p>\n<h2>Data format</h2>\n<p>Beginning with release
        v1.45 on 11 April 2024, data releases contain JSON and CSV files formatted
        according to both <a href=\"https://github.com/ror-community/ror-schema/blob/master/ror_schema.json\">schema
        v1</a> and <a href=\"https://github.com/ror-community/ror-schema/blob/master/ror_schema_v2_0.json\">schema
        v2</a>. v2 files have `_schema_v2` appended to the end of the filename, ex
        v1.45-2024-04-11-ror-data_schema_v2.json. In order to maintain compatibility
        with previous releases, v1 files have no version information in the filename,
        ex v1.45-2024-04-11-ror-data.json.</p>\n<p>For both versions, the CSV file
        contains a subset of fields from the JSON file, some of which have been flattened
        for easier parsing. As ROR records and the ROR schema are maintained in JSON,
        CSVs are for convenience only. JSON is the format of record.</p>\n<h2>Release
        versioning</h2>\n<p>Beginning with v1.45 in April 2024, ROR has introduced
        schema versioning, with files available in <a href=\"https://github.com/ror-community/ror-schema/blob/master/ror_schema.json\">schema
        v1</a> and <a href=\"https://github.com/ror-community/ror-schema/blob/master/ror_schema_v2_0.json\">schema
        v2</a>. The ROR API default version, however, remains v1 and will be changed
        to v2 in April 2025. To align with the API, the data dump major version will
        remain 1 until the API default version is changed to v2. At that time, the
        data dump major version will be incremented to 2 per below.</p>\n<p>Data releases
        are versioned as follows:</p>\n<ul>\n<li>\n<p>Minor versions (ex 1.1, 1.2,
        1.3): Contain changes to data, such as new records and updates to existing
        records. No changes to the data model/structure.</p>\n</li>\n<li>\n<p>Patch
        versions (ex 1.0.1): Used infrequently to correct errors in a release. No
        changes to the data model/structure.</p>\n</li>\n<li>\n<p>Major versions (ex
        1.x, 2.x, 3.x): Contain changes to data model/structure, as well as the data
        itself. Major versions will be released with significant advance notice.</p>\n</li>\n</ul>\n<p>For
        convenience, the date is also included in the release file name, ex: v1.0-2022-03-15-ror-data.zip.</p>\n<h2>Licensing</h2>\n<p>The
        ROR data dump is provided under the <a href=\"https://creativecommons.org/publicdomain/zero/1.0/\">Creative
        Commons CC0 Public Domain Dedication</a>. Location data in ROR comes from
        GeoNames and is licensed under a <a href=\"https://creativecommons.org/licenses/by/4.0\">Creative
        Commons Attribution 4.0 license</a>.</p>", "access_right": "open", "creators":
