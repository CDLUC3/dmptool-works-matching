        "metadata": {"title": "ROR Data", "doi": "10.5281/zenodo.18419061", "publication_date":
        "2026-01-29", "description": "<p>Data dump from the Research Organization
        Registry (ROR), a community-led registry of open identifiers for research
        organizations.</p>\n<p>Release v2.2 contains ROR IDs and metadata for 121,920
        research organizations in JSON and CSV format, in schema version 2. This includes
        the addition of 1,054 new records and metadata updates to 1,128 existing records.
        <a href=\"https://github.com/ror-community/ror-updates/releases/tag/v2.2\">See
        the release notes</a>.</p>\n<h2>Data format</h2>\n<p>Beginning with release
        v2.0 on 16 December 2025, data releases contain JSON and CSV files formatted
        only for&nbsp;<a href=\"https://github.com/ror-community/ror-schema/blob/schema-v2-1/ror_schema_v2_1.json\">schema
        v2</a>. In addition, v2 files will no longer have `_schema_v2` appended to
        the end of the filename, ex v2.0-2025-12-16-ror-data.json.&nbsp;</p>\n<p>The
        CSV file contains a subset of fields from the JSON file, some of which have
        been flattened for easier parsing. As ROR records and the ROR schema are maintained
        in JSON, the CSV is for convenience only. JSON is the format of record.</p>\n<h2>Release
        versioning</h2>\n<p>Beginning with data release 2.0, files in the ROR&nbsp;<a
        href=\"https://ror.readme.io/docs/data-dump\" target=\"_self\">Data dump</a>
        on Zenodo will no longer include CSV and JSON files of the registry in the
        v1 schema. The ROR API default version is v2 as of July 2025, and v1 of the
        ROR API and dataset has been deprecated entirely, as of 8 December 2025. The
        data dump major version has been incremented to 2 per below.</p>\n<p>Data
        releases are versioned as follows:</p>\n<ul>\n<li><strong>Minor versions (ex
        1.1, 1.2, 1.3):</strong>&nbsp; Contain changes to data, such as a new records
        and updates to existing records. No changes to the data model/structure.</li>\n<li><strong>Patch
        versions (ex 1.0.1):</strong>&nbsp; Used infrequently to correct errors in
        a release. No changes to the data model/structure.</li>\n<li><strong>Major
        versions (ex 1.x, 2.x, 3.x):</strong>&nbsp; Contains changes to data model/structure,
        as well as the data itself. Major versions will be released with significant
        advance notice.</li>\n</ul>\n<p>For convenience, the date is also included
        in the release file name, ex: v2.0-2025-12-16-ror-data.zip.</p>\n<p>The ROR
        data dump is provided under the <a href=\"https://creativecommons.org/publicdomain/zero/1.0\">
        Creative Commons CC0 Public Domain Dedication</a>. Location data in ROR comes
        from GeoNames and is licensed under a <a href=\"https://creativecommons.org/licenses/by/4.0\">Creative
        Commons Attribution 4.0 license</a>.</p>", "access_right": "open", "creators":
