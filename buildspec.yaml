version: 0.2

phases:
  pre_build:
    commands:
      - export AWS_VERSION=$(aws --version)
      - echo "AWS CLI: $AWS_VERSION"
      - echo "Logging into Amazon ECR"
      - export ECR_REGISTRY=$(echo "$ECR_REPOSITORY_URI" | cut -d/ -f1)
      - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
      - export IMAGE_TAG=${IMAGE_TAG:=latest}
      - export COMMIT_TAG=$(echo "$CODEBUILD_RESOLVED_SOURCE_VERSION" | cut -c1-7)
      - if [ -z "$COMMIT_TAG" ] || [ "$COMMIT_TAG" = "null" ]; then COMMIT_TAG="manual"; fi
      - echo "IMAGE_TAG=$IMAGE_TAG"
      - echo "COMMIT_TAG=$COMMIT_TAG"
  build:
    commands:
      - echo "Running build for ${ENV:-dev} - started on $(date)"
      - echo "Building dmpworks builder image"
      - docker build --platform linux/amd64 --provenance=false -t dmpworks-builder:latest -f Dockerfile.builder .
      - echo "Building dmpworks batch image"
      - docker build --platform linux/amd64 --provenance=false -t "$ECR_REPOSITORY_URI:$IMAGE_TAG" -t "$ECR_REPOSITORY_URI:$COMMIT_TAG" -f Dockerfile.batch .
  post_build:
    commands:
      - echo "Build completed on $(date)"
      - echo "Pushing dmpworks batch image tags"
      - docker push "$ECR_REPOSITORY_URI:$IMAGE_TAG"
      - docker push "$ECR_REPOSITORY_URI:$COMMIT_TAG"